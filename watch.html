<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HQSL.TV - Watch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">⬢ HQSL.TV</div>
  <a href="index.html" style="color:white;text-decoration:none;">الرئيسية</a>
</header>

<main style="padding:24px;max-width:1200px;margin:auto;">

  <div style="background:#171B23;border-radius:24px;overflow:hidden;">
    <iframe id="player"
      width="100%"
      height="650"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <div style="margin-top:20px;">
    <h1 id="title">HQSL Clip</h1>
    <p style="color:#AEB4C2;">hqsl__ • Twitch Clip</p>
  </div>

</main>

<script>
const params = new URLSearchParams(location.search);
const clipUrl = params.get("clip");
const title = params.get("title") || "HQSL Clip";

document.getElementById("title").textContent = title;

if(clipUrl){
  document.getElementById("player").src = clipUrl.replace("https://www.twitch.tv/","https://clips.twitch.tv/embed?clip=") + "&parent=localhost";
}
</script>

</body>
</html>
